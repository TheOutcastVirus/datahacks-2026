<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Splat Viewer</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #030c16;
  }
  #canvas {
    display: block;
    position: fixed;
    top: 0; left: 0;
    width: 100% !important;
    height: 100% !important;
    touch-action: none;
  }

  #overlay {
    position: fixed; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 12px;
    pointer-events: none;
  }
  .hex { font-size: 64px; color: rgba(45,104,128,0.08); animation: pulse 4s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:.08} 50%{opacity:.16} }

  #progress-wrap {
    width: 200px; height: 2px;
    background: rgba(45,104,128,0.2);
    border-radius: 2px;
    overflow: hidden;
  }
  #progress {
    height: 100%; width: 0;
    background: #00d4b4;
    border-radius: 2px;
    transition: width 0.2s;
  }

  #spinner {
    width: 28px; height: 28px;
    border: 2px solid rgba(0,212,180,0.15);
    border-top-color: #00d4b4;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  #message {
    font-family: monospace;
    font-size: 10px;
    letter-spacing: 0.15em;
    color: rgba(45,104,128,0.6);
    text-transform: uppercase;
  }

  /* hidden helper elements */
  #fps, #camid { display: none; }

  #debug-panel {
    display: block;
    position: fixed;
    top: 12px; right: 12px;
    background: rgba(0,0,0,0.82);
    border: 1px solid rgba(0,212,180,0.3);
    border-radius: 8px;
    padding: 12px 16px;
    font-family: monospace;
    font-size: 12px;
    color: #00d4b4;
    z-index: 9999;
    min-width: 220px;
    pointer-events: all;
  }
  #debug-panel.minimized { display: none; }
  #debug-panel label { display: block; margin-bottom: 4px; color: rgba(0,212,180,0.7); font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; }
  #debug-panel input[type=number] {
    width: 100%; background: rgba(255,255,255,0.07); border: 1px solid rgba(0,212,180,0.25);
    border-radius: 4px; color: #fff; padding: 4px 6px; font-family: monospace; font-size: 12px;
    margin-bottom: 10px;
  }
  #debug-panel .debug-row { display: flex; gap: 6px; align-items: center; margin-bottom: 10px; }
  #debug-panel .debug-row input[type=number] { margin-bottom: 0; }
  #debug-panel button {
    background: rgba(0,212,180,0.15); border: 1px solid rgba(0,212,180,0.4);
    color: #00d4b4; border-radius: 4px; padding: 3px 8px; cursor: pointer; font-family: monospace; font-size: 11px;
  }
  #debug-panel .debug-hint { color: rgba(255,255,255,0.3); font-size: 10px; margin-top: 4px; }
  #debug-panel .debug-info { color: rgba(0,212,180,0.5); font-size: 10px; margin-bottom: 8px; }
</style>
</head>
<body>
<canvas id="canvas"></canvas>

<div id="overlay">
  <div class="hex">&#x2b21;</div>
  <div id="spinner"></div>
  <div id="progress-wrap"><div id="progress"></div></div>
  <div id="message"></div>
</div>

<span id="fps"></span>
<span id="camid"></span>

<div id="debug-panel">
  <div style="margin-bottom:8px;font-size:11px;letter-spacing:0.1em;">⚙ WATER DEBUG <button type="button" id="dbg-minimize" style="float:right;background:none;border:none;color:rgba(0,212,180,0.6);cursor:pointer;font-size:13px;line-height:1;padding:0;">—</button></div>
  <div id="debug-info" class="debug-info">sceneZMin: —</div>
  <label>Baseline Z override</label>
  <div class="debug-row">
    <input type="number" id="dbg-baseline" step="0.1" placeholder="auto">
    <button type="button" id="dbg-baseline-clear">auto</button>
  </div>
  <label>XYZ Offset Z</label>
  <div class="debug-row">
    <input type="number" id="dbg-z-offset" step="0.5" value="0">
  </div>
  <div class="debug-hint">` to toggle panel</div>
</div>

<script type="module" src="./main.js"></script>
<script>
  // Hide overlay once scene is rendered (spinner hidden = done)
  const obs = new MutationObserver(() => {
    const spinner = document.getElementById('spinner');
    if (spinner && spinner.style.display === 'none') {
      document.getElementById('overlay').style.display = 'none';
      obs.disconnect();
    }
  });
  obs.observe(document.body, { subtree: true, attributes: true, attributeFilter: ['style'] });

  // Ensure WebGL canvas resizes with iframe (main.js only listens to window resize)
  const fireResize = () => window.dispatchEvent(new Event('resize'));
  window.addEventListener('load', fireResize);
  if (window.ResizeObserver) {
    new ResizeObserver(fireResize).observe(document.documentElement);
  }
  // Belt-and-suspenders: fire a few times as main.js initializes async
  [50, 250, 800, 2000].forEach(t => setTimeout(fireResize, t));

  window.__debugWater = { baselineOverride: null };
  const panel = document.getElementById('debug-panel');
  document.getElementById('dbg-minimize').addEventListener('click', () => {
    panel.classList.add('minimized');
  });
  // Restore on backtick
  document.addEventListener('keydown', e => {
    if (e.key === '`') { panel.classList.remove('minimized'); setTimeout(refreshInfo, 50); }
  });
  function refreshInfo() {
    const min = window.__debugWater._sceneZMin;
    document.getElementById('debug-info').textContent =
      min != null ? `sceneZMin: ${min.toFixed(4)}` : 'sceneZMin: loading…';
  }
  // Baseline override
  document.getElementById('dbg-baseline').addEventListener('input', e => {
    const v = parseFloat(e.target.value);
    window.__debugWater.baselineOverride = isNaN(v) ? null : v;
    refreshInfo();
  });
  document.getElementById('dbg-baseline-clear').addEventListener('click', () => {
    document.getElementById('dbg-baseline').value = '';
    window.__debugWater.baselineOverride = null;
  });
  // XYZ offset Z
  document.getElementById('dbg-z-offset').addEventListener('input', e => {
    const v = parseFloat(e.target.value);
    if (!isNaN(v) && window.xyzOffset) window.xyzOffset[2] = v;
  });
</script>
</body>
</html>
